# DevImage Nginx 参考配置（腾讯云轻量）
# 复制到 /etc/nginx/conf.d/devimage.conf 并按需修改域名与证书路径

limit_req_zone $binary_remote_addr zone=devimage_raster:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=devimage_api:10m rate=1000r/m;
limit_req_status 429;

upstream devimage_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name cdn.devimage.cn;

    ssl_certificate     /etc/nginx/ssl/cdn.pem;
    ssl_certificate_key /etc/nginx/ssl/cdn.key;

    client_max_body_size 1m;

    # 栅格化路由：avatar / placeholder 的 .webp / .png（源站 CPU 密集）
    location ~ ^/avatar/[^/]+/[^/]+/[0-9]+\.(webp|png)$ {
        limit_req zone=devimage_raster burst=20 nodelay;
        proxy_pass http://devimage_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/[0-9]+/[0-9]+\.(webp|png)$ {
        limit_req zone=devimage_raster burst=20 nodelay;
        proxy_pass http://devimage_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/seed/[^/]+/[0-9]+/[0-9]+\.(webp|png)$ {
        limit_req zone=devimage_raster burst=20 nodelay;
        proxy_pass http://devimage_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        limit_req zone=devimage_api burst=200 nodelay;
        proxy_pass http://devimage_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 443 ssl http2;
    server_name devimage.cn;

    ssl_certificate     /etc/nginx/ssl/devimage.pem;
    ssl_certificate_key /etc/nginx/ssl/devimage.key;

    root /var/www/devimage/apps/docs/.vitepress/dist;
    try_files $uri $uri/ /index.html;
}
